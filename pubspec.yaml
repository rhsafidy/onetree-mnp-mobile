name: mobile_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  # ── Data persistence ───────────────────────────────────────────────────────
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.2
 
  # ── State management ──────────────────────────────────────────────────────
  provider: ^6.1.2
 
  # ── Camera & QR ───────────────────────────────────────────────────────────
  mobile_scanner: ^5.1.1
  image_picker: ^1.0.7
  permission_handler: ^11.3.1
 
  # ── Networking & sync ─────────────────────────────────────────────────────
  dio: ^5.4.3
  connectivity_plus: ^6.0.3
 
  # ── Map & GPS ─────────────────────────────────────────────────────────────
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^11.0.0
  flutter_map_tile_caching: ^9.1.0
 
  # ── Utilities ─────────────────────────────────────────────────────────────
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
 
  # ── UI ────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
