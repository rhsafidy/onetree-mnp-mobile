name: mobile_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  # ── Data persistence ───────────────────────────────────────────────────────
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
 
  # ── State management ──────────────────────────────────────────────────────
  provider: ^6.1.5
  # ── Camera & QR ───────────────────────────────────────────────────────────
  mobile_scanner: ^7.2.0
  image_picker: ^1.2.2
  permission_handler: ^12.0.1
 
  # ── Networking & sync ─────────────────────────────────────────────────────
  dio: ^5.9.2 
  connectivity_plus: ^7.1.1
 
  # ── Map & GPS ─────────────────────────────────────────────────────────────
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2 
  flutter_map_tile_caching: ^10.1.1
 
  # ── Utilities ─────────────────────────────────────────────────────────────
  uuid: ^4.5.3
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.0
 
  # ── UI ────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.9 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.7.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
